server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 25M;

    # ---- Tiny health endpoint for Docker healthcheck ----
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- API proxy: /api/foo -> backend:8000/foo ----
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Backend's OpenAPI docs ----
    location = /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ---- SPA: serve index.html for any unknown path so client-side
    #     routing keeps working on full reloads / direct URL hits ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
