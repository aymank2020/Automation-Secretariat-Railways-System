# Local development stack.
#
# - Reads optional values from a local ".env" (gitignored).
# - Backend talks to a SQLite file mounted on a named volume by default.
# - For production deployment use docker-compose.prod.yml instead.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railways-backend-dev
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/railways_hr.db}
      SECRET_KEY: ${SECRET_KEY:-dev-only-32chars-secret-key-change-me-please}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-http://localhost:5173}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
      - backend_uploads:/app/uploads

  frontend:
    image: node:20-alpine
    container_name: railways-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
  frontend_node_modules:
