services:
  postgres:
    image: postgres:16-alpine
    container_name: railways-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railways-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    # No public ports - only the in-cluster nginx talks to backend.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: railways-frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
    networks: [internal]
    ports:
      # Bind to localhost only - cloudflared talks to it via the host's loopback.
      - "127.0.0.1:8080:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: railways-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks: [internal]

volumes:
  postgres_data:
  uploads_data:

networks:
  internal:
    driver: bridge
